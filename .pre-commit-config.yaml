repos:
  # Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  # Mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies: ["types-requests", "types-PyYAML"]
  ## JS ##
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        args:
          [
            "--config",
            "frontend/.prettierrc",
            "--ignore-unknown",
            "--write",
            "--check",
          ]
        language: node
        entry: frontend/node_modules/.bin/prettier
        require_serial: true
        files: ^frontend/.*\.(js|jsx|ts|tsx|css|svelte)$
        additional_dependencies:
          - prettier
          - prettier-plugin-svelte
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.1.0
    hooks:
      - id: eslint
        name: eslint
        language: node
        entry: frontend/node_modules/eslint/bin/eslint.js
        args: [--config, frontend/eslint.config.js]
        require_serial: true
        files: \.(js|ts|svelte|css|mjs)$
        additional_dependencies:
          - eslint
          - svelte
          - typescript
          - eslint-plugin-svelte
          - "@typescript-eslint/eslint-plugin"
          - "@typescript-eslint/parser"
          - svelte-eslint-parser
  - repo: local
    hooks:
      - id: svelte-check
        name: Svelte check
        language: system
        entry: npx svelte-check --fail-on-warnings
        files: \.(js|ts|svelte)$
        pass_filenames: false
        require_serial: true
  ## SQL ##
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.0.4
    hooks:
      - id: sqlfluff-lint
        args: ["--config", "backend/pyproject.toml"]
      - id: sqlfluff-fix
        args: ["--config", "backend/pyproject.toml"]
