# This is an example config file for AppGoblin
# If you have questions feel free to reach out 
# This file is meant to be in ~/.config/appgoblin/config.toml

[AServerName]
host = "192.168.0.1"
os_user = "root"
db_user = "postgres"
db_password = "postgres"
db_name = "dbname"
ssh_pkey = "/home/myuser/.ssh/mykey"
ssh_pkey_password = "mypassword"

[example-other-server]
host = "192.168.0.1"
ssh_port = 8802
os_user = "myuser"
db_user = "myuser"
db_password = "mypassword"
db_name = "dbname"
ssh_pkey = "/home/myuser/.ssh/mykey"
ssh_pkey_password = "mypassword"

[cloud]
access_key_id = "myaccesskey"
secret_key = "mysecretkey"

[umami]
site_id = "my-site-id"
base_url = "https://my-umami-instance.com"

# Backend serves /api/v1/* endpoints which validate API keys against
# the goblinadmin database (same DB the SvelteKit frontend uses).
# The goblinadmin-write config is used for key validation queries.
# Ensure this user has SELECT on api_keys, users, and subscriptions.
[goblinadmin-write]
host = "192.168.0.1"
db_user = "myuser"
db_password = "mypassword"
db_name = "goblinadmin"

# Stripe price ID → tier label mapping for API key rate limits.
# Values must match STRIPE_PRICE_*_ID env vars from the SvelteKit frontend.
[tier_prices]
"price_xxx_app_dev" = "premium_access"
"price_xxx_b2b_sdk" = "b2b_sdk"
"price_xxx_b2b_appads" = "b2b_appads"
"price_xxx_b2b_premium" = "b2b_premium"

[public-s3]
region_name = "nyc3"
host = "nyc3.digitaloceanspaces.com"
access_key_id = "myaccesskey"
secret_key = "mysecretkey"
bucket = "my-public-bucket"
